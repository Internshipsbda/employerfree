  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 /* hover / link text */\n  --blue-800: #2C6079;  /* deep text on tint */\n\n  /* ---- Wicked / alert deep-burnt (validation, \"broken\") ---- */\n  --burnt-300: #E8B89A;\n  --burnt-100: #FBE9DC;\n  --burnt:     #B54A14;\n  --burnt-900: #7A2F0A;\n\n  /* ---- Neutrals ---- */\n  --ink:       #0E1A23;  /* primary text — near-black */\n  --ink-soft:  #1A2733;  /* alt ink (student app) */\n  --slate:     #D3DCE1;  /* hairline borders */\n  --slate-50:  #F4F7F8;  /* tinted neutral fill */\n  --paper:     #FBFAF7;  /* app background — warm off-white */\n  --white:     #FFFFFF;\n  --black:     #000000;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reach for these in components.\n     ============================================================ */\n  --bg-app:        var(--paper);\n  --bg-surface:    var(--white);\n  --bg-tint:       var(--slate-50);\n  --bg-blue-tint:  var(--blue-50);\n  --bg-orange-tint:var(--orange-50);\n\n  --text-primary:   var(--ink);\n  --text-secondary: rgba(14, 26, 35, 0.70);\n  --text-muted:     rgba(14, 26, 35, 0.55);\n  --text-on-dark:   var(--white);\n  --text-link:      var(--blue-700);\n\n  --action:         var(--orange);\n  --action-hover:   var(--orange-600);\n  --action-press:   var(--orange-700);\n  --action-text:    var(--ink);   /* orange buttons carry ink text */\n\n  --accent:         var(--blue);\n  --accent-hover:   var(--blue-700);\n\n  --border:         var(--slate);\n  --border-strong:  rgba(14, 26, 35, 0.18);\n  --focus-ring:     rgba(84, 153, 187, 0.40);\n  --focus-ring-action: rgba(251, 168, 86, 0.55);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   TYPOGRAPHY TOKENS — Montserrat (display) + Raleway (body).\n   Headings are heavy (700–900) and tight; body is Raleway 400–600.\n   Eyebrows/labels are uppercase with wide tracking.\n   ============================================================ */\n:root {\n  --font-display: \"Montserrat\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-body:    \"Raleway\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono:    ui-monospace, \"SF Mono\", SFMono-Regular, Menlo, Monaco, Consolas, \"Courier New\", monospace;\n\n  /* Weights */\n  --fw-light:    300; /* @kind other */\n  --fw-regular:  400; /* @kind other */\n  --fw-medium:   500; /* @kind other */\n  --fw-semibold: 600; /* @kind other */\n  --fw-bold:     700; /* @kind other */\n  --fw-extra:    800; /* @kind other */\n  --fw-black:    900; /* @kind other */\n\n  /* Type scale (px) */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-lg:   18px;\n  --text-xl:   20px;\n  --text-2xl:  24px;\n  --text-3xl:  30px;\n  --text-4xl:  36px;\n  --text-5xl:  48px;\n  --text-6xl:  60px;\n\n  /* Line heights */\n  --leading-tight:   1.05;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-display: -0.02em;  /* big headings */\n  --tracking-tight:   -0.01em;  /* headings */\n  --tracking-normal:  0;\n  --tracking-eyebrow: 0.18em;    /* uppercase labels */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SPACING & RADII — 4px base grid. Cards use 12–16px radius,\n   pills/badges fully round, inputs/buttons 8–12px.\n   ============================================================ */\n:root {\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Radii */\n  --radius-sm:   6px;\n  --radius-md:   8px;   /* inputs, small buttons */\n  --radius-lg:   12px;  /* buttons, small cards */\n  --radius-xl:   16px;  /* cards */\n  --radius-2xl:  20px;  /* feature cards */\n  --radius-pill: 9999px;\n\n  /* Container widths */\n  --container-sm: 640px;\n  --container-md: 768px;\n  --container-lg: 1024px;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   EFFECTS — shadows, borders, gradients, transitions.\n   The brand is flat-with-soft-lift: hairline slate borders +\n   a small soft shadow on cards. Gradients only on the blue\n   \"result\" surfaces.\n   ============================================================ */\n:root {\n  /* Shadows — subtle, cool-tinted */\n  --shadow-xs: 0 1px 2px rgba(14, 26, 35, 0.05);\n  --shadow-sm: 0 1px 3px rgba(14, 26, 35, 0.08), 0 1px 2px rgba(14, 26, 35, 0.04);\n  --shadow-md: 0 4px 12px rgba(14, 26, 35, 0.08);\n  --shadow-lg: 0 12px 28px rgba(14, 26, 35, 0.12);\n  --shadow-focus: 0 0 0 3px var(--focus-ring);\n\n  /* Signature gradient — blue \"result\" / feature panels */\n  --gradient-blue: linear-gradient(135deg, var(--blue) 0%, var(--blue-700) 100%);\n  --gradient-orange: linear-gradient(135deg, var(--orange) 0%, var(--orange-600) 100%);\n\n  /* Borders */\n  --border-width: 1px;\n  --border-hairline: 1px solid var(--border);\n\n  /* Motion — quick, no bounce. Calm + decisive. */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 150ms; /* @kind other */\n  --dur-base: 250ms; /* @kind other */\n  --dur-slow: 500ms; /* @kind other */\n  --transition-colors: color var(--dur-fast) var(--ease-standard),\n                       background-color var(--dur-fast) var(--ease-standard),\n                       border-color var(--dur-fast) var(--ease-standard);\n}\n<\u002Fstyle>\n  <style>/* Internship Insights Co. — Design System entry point.\n   Consumers link THIS file. It is @import lines only. */\n/* Webfonts — Montserrat (display/headings) + Raleway (body).\n   The two families the user self-hosted (uploaded weights below) plus the\n   Google Fonts CDN for the remaining weights of each family.\n   NOTE: the Playad brand profile listed Inter Tight as the display face;\n   the uploaded Montserrat files + production codebase use Montserrat, so the\n   system standardizes on Montserrat. Say the word to switch back to Inter Tight. */\n\n/* Self-hosted uploaded weights */\n@font-face {\n  font-family: \"Montserrat\";\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"53672227-04ab-4af5-b49f-956ff04d6358\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Raleway\";\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"3e509d96-002c-4090-9832-52d85d36537d\") format(\"truetype\");\n}\n\n/* Remaining weights via CDN */\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"52ee24af-59da-428d-b8a5-63cc4cb32cae\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"15a75627-19e5-4cf0-a7ad-48ce80523144\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"4e862693-4b09-4e9e-ad04-b9b93cfe7a8c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Montserrat';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"3173b005-d6ab-4591-bdf4-8538e8d1f484\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Montserrat';\n  f +0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2d0a7f0c-d5ce-4096-860f-5115ec8be66b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   COLOR TOKENS — Internship Insights Co.\n   Black & white for authority, muted blue for trust,\n   warm orange for action. Source of truth: production codebase.\n   ============================================================ */\n:root {\n  /* ---- Brand orange (action / emphasis) ---- */\n  --orange-50:  #FFF5EA;\n  --orange-100: #FFE6CC;\n  --orange-200: #FBD2A4;\n  --orange:     #FBA856;  /* primary action */\n  --orange-600: #F08A25;  /* hover / darker */\n  --orange-700: #C96F12;  /* pressed / strong text */\n  --orange-900: #7A4810;  /* selected-on-tint text */\n\n  /* ---- Brand blue (trust / professionalism) ---- */\n  --blue-50:  #EEF5F9;\n  --blue-100: #D6E7EF;\n  --blue:     #5499BB;  /* primary brand blue */\n  --blue-700: #3A7995;  /* hover / link text */\n  --blue-800: #2C6079;  /* deep text on tint */\n\n  /* ---- Wicked / alert deep-burnt (validation, \"broken\") ---- */\n  --burnt-300: #E8B89A;\n  --burnt-100: #FBE9DC;\n  --burnt:     #B54A14;\n  --burnt-900: #7A2F0A;\n\n  /* ---- Neutrals ---- */\n  --ink:       #0E1A23;  /* primary text — near-black */\n  --ink-soft:  #1A2733;  /* alt ink (student app) */\n  --slate:     #D3DCE1;  /* hairline borders */\n  --slate-50:  #F4F7F8;  /* tinted neutral fill */\n  --paper:     #FBFAF7;  /* app background — warm off-white */\n  --white:     #FFFFFF;\n  --black:     #000000;\n\n  /* ============================================================\n     SEMANTIC ALIASES — reach for these in components.\n     ============================================================ */\n  --bg-app:        var(--paper);\n  --bg-surface:    var(--white);\n  --bg-tint:       var(--slate-50);\n  --bg-blue-tint:  var(--blue-50);\n  --bg-orange-tint:var(--orange-50);\n\n  --text-primary:   var(--ink);\n  --text-secondary: rgba(14, 26, 35, 0.70);\n  --text-muted:     rgba(14, 26, 35, 0.55);\n  --text-on-dark:   var(--white);\n  --text-link:      var(--blue-700);\n\n  --action:         var(--orange);\n  --action-hover:   var(--orange-600);\n  --action-press:   var(--orange-700);\n  --action-text:    var(--ink);   /* orange buttons carry ink text */\n\n  --accent:         var(--blue);\n  --accent-hover:   var(--blue-700);\n\n  --border:         var(--slate);\n  --border-strong:  rgba(14, 26, 35, 0.18);\n  --focus-ring:     rgba(84, 153, 187, 0.40);\n  --focus-ring-action: rgba(251, 168, 86, 0.55);\n}\n\n/* ============================================================\n   TYPOGRAPHY TOKENS — Montserrat (display) + Raleway (body).\n   Headings are heavy (700–900) and tight; body is Raleway 400–600.\n   Eyebrows/labels are uppercase with wide tracking.\n   ============================================================ */\n:root {\n  --font-display: \"Montserrat\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-body:    \"Raleway\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono:    ui-monospace, \"SF Mono\", SFMono-Regular, Menlo, Monaco, Consolas, \"Courier New\", monospace;\n\n  /* Weights */\n  --fw-light:    300; /* @kind other */\n  --fw-regular:  400; /* @kind other */\n  --fw-medium:   500; /* @kind other */\n  --fw-semibold: 600; /* @kind other */\n  --fw-bold:     700; /* @kind other */\n  --fw-extra:    800; /* @kind other */\n  --fw-black:    900; /* @kind other */\n\n  /* Type scale (px) */\n  --text-xs:   12px;\n  --text-sm:   14px;\n  --text-base: 16px;\n  --text-lg:   18px;\n  --text-xl:   20px;\n  --text-2xl:  24px;\n  --text-3xl:  30px;\n  --text-4xl:  36px;\n  --text-5xl:  48px;\n  --text-6xl:  60px;\n\n  /* Line heights */\n  --leading-tight:   1.05;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-display: -0.02em;  /* big headings */\n  --tracking-tight:   -0.01em;  /* headings */\n  --tracking-normal:  0;\n  --tracking-eyebrow: 0.18em;    /* uppercase labels */\n}\n\n/* ============================================================\n   SPACING & RADII — 4px base grid. Cards use 12–16px radius,\n   pills/badges fully round, inputs/buttons 8–12px.\n   ============================================================ */\n:root {\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Radii */\n  --radius-sm:   6px;\n  --radius-md:   8px;   /* inputs, small buttons */\n  --radius-lg:   12px;  /* buttons, small cards */\n  --radius-xl:   16px;  /* cards */\n  --radius-2xl:  20px;  /* feature cards */\n  --radius-pill: 9999px;\n\n  /* Container widths */\n  --container-sm: 640px;\n  --container-md: 768px;\n  --container-lg: 1024px;\n}\n\n/* ============================================================\n   EFFECTS — shadows, borders, gradients, transitions.\n   The brand is flat-with-soft-lift: hairline slate borders +\n   a small soft shadow on cards. Gradients only on the blue\n   \"result\" surfaces.\n   ============================================================ */\n:root {\n  /* Shadows — subtle, cool-tinted */\n  --shadow-xs: 0 1px 2px rgba(14, 26, 35, 0.05);\n  --shadow-sm: 0 1px 3px rgba(14, 26, 35, 0.08), 0 1px 2px rgba(14, 26, 35, 0.04);\n  --shadow-md: 0 4px 12px rgba(14, 26, 35, 0.08);\n  --shadow-lg: 0 12px 28px rgba(14, 26, 35, 0.12);\n  --shadow-focus: 0 0 0 3px var(--focus-ring);\n\n  /* Signature gradient — blue \"result\" / feature panels */\n  --gradient-blue: linear-gradient(135deg, var(--blue) 0%, var(--blue-700) 100%);\n  --gradient-orange: linear-gradient(135deg, var(--orange) 0%, var(--orange-600) 100%);\n\n  /* Borders */\n  --border-width: 1px;\n  --border-hairline: 1px solid var(--border);\n\n  /* Motion — quick, no bounce. Calm + decisive. */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 150ms; /* @kind other */\n  --dur-base: 250ms; /* @kind other */\n  --dur-slow: 500ms; /* @kind other */\n  --transition-colors: color var(--dur-fast) var(--ease-standard),\n                       background-color var(--dur-fast) var(--ease-standard),\n                       border-color var(--dur-fast) var(--ease-standard);\n}\n\n<\u002Fstyle>\n  <script src=\"e148b9d6-58d2-4c0c-be1f-c3780700bdcf\"><\u002Fscript>\n  <style>\n    html,body{margin:0}\n    body{background:var(--paper);font-family:var(--font-body),system-ui,sans-serif;color:var(--ink)}\n    .kw-h1{font-family:var(--font-display);font-size:38px;font-weight:900;letter-spacing:-.02em;line-height:1.06;margin:0 0 12px;color:var(--ink)}\n    .kw-intro{color:var(--text-secondary);margin:0 0 24px;line-height:1.6;font-size:15px}\n    .kw-qcard{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-sm);padding:22px}\n    .kw-qhead{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}\n    .kw-qnum{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--orange);color:var(--ink);font-family:var(--font-display);font-weight:800;font-size:14px;display:grid;place-items:center}\n    .kw-qprompt{font-family:var(--font-display);font-weight:700;font-size:16px;line-height:1.3;margin:0;color:var(--ink);padding-top:3px}\n    .kw-eyebrow{font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;margin:0 0 10px}\n    .kw-reslabel{font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);margin:0 0 6px}\n    .kw-hint{font-size:12px;color:var(--text-muted);text-align:center;margin:10px 0 0}\n    @media print{.kw-noprint{display:none!important}body{background:#fff}}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n  <div class=\"kw-noprint\" style=\"display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--white)\">\n    <img src=\"f6a730d2-9164-4e92-8b0b-0eff25e3ae29\" alt=\"\" style=\"height:36px;width:36px\">\n    <span style=\"font-family:var(--font-display);font-weight:800;font-size:16px;letter-spacing:-.01em;color:var(--ink)\">Internship Insights Co.<\u002Fspan>\n  <\u002Fdiv>\n\n  <main style=\"flex:1;width:100%;max-width:680px;margin:0 auto;box-sizing:border-box;padding:40px 24px 56px\">\n\n    <sc-if value=\"{{ v.submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <p class=\"kw-eyebrow\" style=\"color:var(--blue-700)\">Your environment read<\u002Fp>\n      <h2 style=\"font-family:var(--font-display);font-size:28px;font-weight:900;letter-spacing:-.02em;margin:0 0 22px;color:var(--ink)\">Here's your read, {{ v.firstName }}.<\u002Fh2>\n      <div style=\"{{ v.heroStyle }}\">\n        <p class=\"kw-reslabel\">Result<\u002Fp>\n        <p style=\"font-family:var(--font-display);font-size:32px;font-weight:900;letter-spacing:-.02em;margin:0 0 6px\"><span style=\"{{ v.verdictStyle }}\">{{ v.verdict }}<\u002Fspan><\u002Fp>\n        <p style=\"font-size:14px;line-height:1.55;color:var(--text-secondary);margin:0 0 20px\">{{ v.tagline }}<\u002Fp>\n        <div style=\"position:relative;height:26px;margin-bottom:8px\">\n          <div style=\"position:absolute;top:7px;left:0;right:0;height:12px;border-radius:999px;background:linear-gradient(90deg,var(--blue) 0%,var(--orange) 55%,var(--burnt) 100%)\"><\u002Fdiv>\n          <div style=\"{{ v.markerStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.14em\">\n          <span style=\"color:var(--blue-800)\">KIND<\u002Fspan>\n          <span style=\"color:var(--burnt)\">WICKED<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;color:var(--text-muted);margin:10px 0 0\">{{ v.pctLabel }} / 100 on the wicked scale<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--border);border-radius:16px;background:var(--white);box-shadow:var(--shadow-sm);padding:22px;margin-top:16px\">\n        <p class=\"kw-reslabel\">What this means for your interns<\u002Fp>\n        <p style=\"font-size:14.5px;line-height:1.6;color:var(--text-secondary);margin:0\">{{ v.implication }}<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"border-radius:16px;border:1px solid var(--orange);border-left:4px solid var(--orange);background:var(--orange-50);padding:24px;margin-top:16px\">\n        <p class=\"kw-eyebrow\" style=\"color:var(--orange-700)\">Next step<\u002Fp>\n        <p style=\"font-family:var(--font-display);font-size:20px;font-weight:800;color:var(--ink);margin:0 0 8px;line-height:1.25\">Let's build an internship program that fits your environment.<\u002Fp>\n        <p style=\"font-size:14px;line-height:1.55;color:var(--text-secondary);margin:0 0 18px\">We'll audit your current internship program and design the scaffolding your interns actually need.<\u002Fp>\n        <x-import component-from-global-scope=\"InternshipInsightsCoDesignSystem_cd6ca8.Button\" variant=\"primary\" size=\"lg\" full-width=\"{{ true }}\" hint-size=\"100%,52px\">Reach out to get your program audited →<\u002Fx-import>\n        <div class=\"kw-noprint\" style=\"display:flex;gap:10px;margin-top:14px\">\n          <x-import component-from-global-scope=\"InternshipInsightsCoDesignSystem_cd6ca8.Button\" variant=\"outline\" onclick=\"{{ v.onPrint }}\" hint-size=\"auto,44px\">Print / save summary<\u002Fx-import>\n          <x-import component-from-global-scope=\"InternshipInsightsCoDesignSystem_cd6ca8.Button\" variant=\"ghost\" onclick=\"{{ v.onReset }}\" hint-size=\"auto,44px\">Start over<\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ v.editing }}\" hint-placeholder-val=\"{{ true }}\">\n      <p class=\"kw-eyebrow\" style=\"color:var(--orange-700)\">8-question diagnostic for employers<\u002Fp>\n      <h1 class=\"kw-h1\">Is your workplace <span style=\"color:var(--blue)\">Kind<\u002Fspan> or <span style=\"color:var(--burnt)\">Wicked<\u002Fspan>?<\u002Fh1>\n      <p class=\"kw-intro\">Skills develop fast in <strong>kind<\u002Fstrong> environments — clear rules, quick feedback, repeating patterns. They stall in <strong>wicked<\u002Fstrong> ones, where rules are incomplete and feedback is delayed. Knowing which you run is the first step to designing a high-impact internship.<\u002Fp>\n\n      <div style=\"background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-sm);padding:20px;margin-bottom:22px;display:flex;flex-direction:column;gap:16px\">\n        <x-import component-from-global-scope=\"InternshipInsightsCoDesignSystem_cd6ca8.TextField\" label=\"Your name\" id=\"e-name\" placeholder=\"Jane Smith\" value=\"{{ v.name }}\" onchange=\"{{ v.onName }}\" hint-size=\"100%,70px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"InternshipInsightsCoDesignSystem_cd6ca8.TextField\" label=\"Company\" id=\"e-co\" placeholder=\"Acme Inc.\" value=\"{{ v.company }}\" onchange=\"{{ v.onCompany }}\" hint-size=\"100%,70px\"><\u002Fx-import>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <sc-for list=\"{{ v.questions }}\" as=\"q\" hint-placeholder-count=\"4\">\n          <div class=\"kw-qcard\">\n            <div class=\"kw-qhead\">\n              <span class=\"kw-qnum\">{{ q.n }}<\u002Fspan>\n              <p class=\"kw-qprompt\">{{ q.prompt }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px\">\n              <div style=\"border:1px solid var(--blue-100);background:var(--blue-50);border-radius:10px;padding:11px 13px\">\n                <span style=\"font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--blue-800)\">KIND<\u002Fspan>\n                <p style=\"font-size:12.5px;line-height:1.45;color:var(--text-secondary);margin:5px 0 0\">{{ q.kind }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"border:1px solid var(--burnt-300);background:var(--burnt-100);border-radius:10px;padding:11px 13px\">\n                <span style=\"font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--burnt)\">WICKED<\u002Fspan>\n                <p style=\"font-size:12.5px;line-height:1.45;color:var(--text-secondary);margin:5px 0 0\">{{ q.wicked }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <sc-for list=\"{{ q.opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                <button type=\"button\" onclick=\"{{ opt.onSelect }}\" style=\"{{ opt.segStyle }}\">{{ opt.short }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:22px\">\n        <x-import component-from-global-scope=\"InternshipInsightsCoDesignSystem_cd6ca8.Button\" variant=\"primary\" size=\"lg\" full-width=\"{{ true }}\" disabled=\"{{ v.cannotSubmit }}\" onclick=\"{{ v.onSubmit }}\" hint-size=\"100%,54px\">{{ v.submitLabel }}<\u002Fx-import>\n        <p class=\"kw-hint\">Takes about 90 seconds · Instant read · No spam<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n\n  <footer class=\"kw-noprint\" style=\"border-top:1px solid var(--border);background:var(--white)\">\n    <div style=\"max-width:680px;margin:0 auto;padding:18px 24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-muted)\">\n      <span>© 2026 Internship Insights Co. — Unlocking potential through experience.<\u002Fspan>\n      <span>Bermuda's only internship transformation firm.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  QUESTIONS = [\n    { id:'q1', prompt:'How does most of the work get done?',\n      kind:'Work follows a clear, repeatable process — a manual or script gets you to the right answer.',\n      wicked:'Work is open-ended — there is no set playbook, and the path gets figured out as you go.' },\n    { id:'q2', prompt:'What is feedback like on this team?',\n      kind:'Feedback is fast, accurate, and clearly tied to what someone just did (like chess or golf).',\n      wicked:'Feedback is slow, fuzzy, or missing — short-term progress does not always mean real learning.' },\n    { id:'q3', prompt:'How do new problems usually show up?',\n      kind:'Problems look familiar — we recognise them from past experience and reach for a known fix.',\n      wicked:'The best answers come from reframing the problem, often with a fresh outside perspective.' },\n    { id:'q4', prompt:'How well does past experience predict success here?',\n      kind:'Deep specialist experience is a reliable predictor — more of it usually means better results.',\n      wicked:'Experience can backfire — people get locked into familiar tools and over-confident assumptions.' },\n    { id:'q5', prompt:'How stable is the environment you operate in?',\n      kind:'It is stable — the same patterns hold for years, so what worked before keeps working.',\n      wicked:'It shifts fast — what worked last quarter can hit a wall today, forcing constant recalibration.' },\n    { id:'q6', prompt:'What kind of thinking gets rewarded?',\n      kind:'Deep specialisation — going narrow and mastering one area or system.',\n      wicked:'Connecting the dots across areas and repurposing what is already on hand.' },\n    { id:'q7', prompt:'Where do your best solutions come from?',\n      kind:'Reusing proven methods — if a fix worked once, we apply the same one again.',\n      wicked:'Borrowing ideas from unrelated fields to crack problems that look nothing alike.' },\n    { id:'q8', prompt:'How are decisions typically made?',\n      kind:'By clear rules, where everyone knows what winning looks like.',\n      wicked:'Under real uncertainty — we work from best guesses and keep experimenting.' },\n  ];\n\n  state = { name:'', company:'', answers:{}, submitted:false };\n\n  setField(field, value) { this.setState({ [field]: value }); }\n  setAnswer(qid, value) { this.setState(s => ({ answers: { ...s.answers, [qid]: value } })); }\n  submit() { this.setState({ submitted:true }); }\n  reset() { this.setState({ name:'', company:'', answers:{}, submitted:false }); }\n\n  toW(x) { return x === 'kind' ? 0 : x === 'wicked' ? 100 : 50; }\n\n  buildView() {\n    const st = this.state;\n    const ans = st.answers;\n    const answeredIds = this.QUESTIONS.filter(q => ans[q.id] != null);\n    const answered = answeredIds.length;\n    const all = answered === this.QUESTIONS.length;\n    const wvals = answeredIds.map(q => this.toW(ans[q.id]));\n    const pct = wvals.length ? Math.round(wvals.reduce((a,b)=>a+b,0) / wvals.length) : 50;\n\n    let verdict, accent, tintBg, tagline, implication;\n    if (pct < 40) {\n      verdict = 'Kind environment'; accent = 'var(--blue)'; tintBg = 'var(--blue-50)';\n      tagline = 'Clear rules and quick feedback — skills compound fast here.';\n      implication = 'Because the work is predictable and feedback is fast, interns learn quickly through structured, repeatable practice. Lean into a strong onboarding script, well-scoped tasks, and focused skill-building — the environment does a lot of the teaching for you.';\n    } else if (pct > 60) {\n      verdict = 'Wicked environment'; accent = 'var(--burnt)'; tintBg = 'var(--burnt-100)';\n      tagline = 'Ambiguity and delayed feedback are the norm — range matters more than repetition.';\n      implication = 'Because the work is ambiguous and feedback is slow, interns need broad range and comfort with uncertainty. Build in cognitive scaffolding — micro-milestones, a daily check-in, and protected time to explore — so they can navigate the complexity while their skills are still wiring up.';\n    } else {\n      verdict = 'Mixed environment'; accent = 'var(--orange)'; tintBg = 'var(--orange-50)';\n      tagline = 'Part predictable, part genuinely ambiguous — the mix is the challenge.';\n      implication = 'Some of the work is predictable and some is genuinely ambiguous. Match interns to the task: use structured practice for the clear-cut parts, and add milestones and regular check-ins to guide them through the messy ones.';\n    }\n\n    const segTones = {\n      kind:   { bc:'var(--blue)',  bg:'var(--blue-50)',  tc:'var(--blue-800)' },\n      both:   { bc:'var(--ink)',   bg:'var(--slate-50)', tc:'var(--ink)' },\n      wicked: { bc:'var(--burnt)', bg:'var(--burnt-100)',tc:'var(--burnt-900)' },\n    };\n\n    const questions = this.QUESTIONS.map((q, i) => {\n      const cur = ans[q.id];\n      const mkOpt = (key, short) => {\n        const sel = cur === key;\n        const t = segTones[key];\n        return {\n          key, short, selected: sel,\n          onSelect: () => this.setAnswer(q.id, key),\n          segStyle: {\n            flex:1, cursor:'pointer', padding:'11px 6px', borderRadius:9,\n            fontFamily:'var(--font-display)', fontWeight:700, fontSize:14, textAlign:'center',\n            transition:'all .15s cubic-bezier(.4,0,.2,1)',\n            border: sel ? '2px solid ' + t.bc : '2px solid var(--border)',\n            background: sel ? t.bg : 'var(--white)',\n            color: sel ? t.tc : 'var(--text-muted)',\n          },\n        };\n      };\n      return {\n        n: i+1, prompt: q.prompt, kind: q.kind, wicked: q.wicked,\n        opts: [ mkOpt('kind','Kind'), mkOpt('both','Both'), mkOpt('wicked','Wicked') ],\n      };\n    });\n\n    const canSubmit = all && st.name.trim().length > 0;\n\n    return {\n      name: st.name, company: st.company,\n      submitted: st.submitted, editing: !st.submitted,\n      firstName: st.name.trim().split(' ')[0] || 'there',\n      onName: (e) => this.setField('name', e.target.value),\n      onCompany: (e) => this.setField('company', e.target.value),\n      onSubmit: () => this.submit(),\n      onReset: () => this.reset(),\n      onPrint: () => window.print(),\n      questions, answered, all, cannotSubmit: !canSubmit,\n      submitLabel: canSubmit ? 'See my Kind-or-Wicked read →' : (st.name.trim() ? ('Answer all 8 to continue (' + answered + ' / 8)') : 'Add your name to continue'),\n      pct, pctLabel: pct, verdict, tagline, implication,\n      heroStyle: { background: tintBg, border: '1px solid ' + accent, borderLeft: '4px solid ' + accent, borderRadius:16, padding:24 },\n      verdictStyle: { color: accent },\n      markerStyle: {\n        position:'absolute', top:'50%', left: pct + '%', transform:'translate(-50%,-50%)',\n        width:20, height:20, borderRadius:'50%', background:'var(--white)',\n        border:'3px solid ' + accent, boxShadow:'0 1px 5px rgba(14,26,35,.35)', zIndex:2,\n      },\n    };\n  }\n\n  renderVals() { return { v: this.buildView() }; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
